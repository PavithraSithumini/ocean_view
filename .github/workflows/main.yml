name: Java CI/CD

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean compile

      - name: Run Unit Tests
        run: mvn test

  package:
    name: Package & Upload Artifact
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Package WAR file
        run: mvn clean package -DskipTests

      - name: Upload WAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: oceanview-resort-app
          path: target/*.war
          retention-days: 30
